<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桐城中学--叶老师教学</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            line-height: 1.8;
            color: #333;
            background: #f0f2f5;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 0;
            background: linear-gradient(135deg, #5c0000 0%, #8B0000 20%, #C41E3A 50%, #8B0000 80%, #5c0000 100%);
            color: white;
            position: relative;
            overflow: hidden;
            min-height: 166px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(139,0,0,0.5);
        }
        /* 红金纹理背景 */
        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(255,215,0,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(255,215,0,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(255,100,0,0.1) 0%, transparent 60%);
            pointer-events: none;
        }
        /* 顶部装饰线 */
        header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #FFD700, #FFA500, #FFD700);
        }
        .header-content {
            position: relative;
            z-index: 1;
            padding: 22px 10mm 15px;
            width: 100%;
            max-width: 100%;
        }
        .motto {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(60px, 9.8vw, 166px);
            color: #FFD700;
            text-shadow: 0 0 18px rgba(255,215,0,0.8), 0 0 36px rgba(255,165,0,0.6), 0 4px 6px rgba(0,0,0,0.4);
            letter-spacing: 13px;
            line-height: 1.05;
            white-space: nowrap;
            font-weight: normal;
        }
        .header-bg-img {
            position: absolute;
            right: 0;
            bottom: 0;
            height: 100%;
            width: auto;
            object-fit: contain;
            object-position: right bottom;
            pointer-events: none;
            z-index: 1;
        }
        .header-bottom-border {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #FFD700, #FFA500, #FFD700);
        }
        .container { max-width: 100%; margin: 0; padding: 30px 20px; }
        .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: calc(100vh - 190px); }
        @media (max-width: 900px) { .two-columns { grid-template-columns: 1fr; } }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; height: 100%; display: flex; flex-direction: column; }
        .card-header { padding: 20px 25px; font-size: 1.3em; font-weight: 600; display: flex; align-items: center; gap: 10px; color: white; }
        .homework-header { background: linear-gradient(135deg, #667eea, #764ba2); }
        .answer-header { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .card-body { padding: 25px; flex: 1; overflow-y: auto; }

        h3 { color: #667eea; margin: 18px 0 8px; font-size: 2.5em; } #改标题大小
        
        h3:first-child { margin-top: 0; }
        
        .hw-text { font-size: 2.0em; line-height: 2; color: #000; } #改内容文字大小
        
        .answer-content { display: flex; flex-direction: column; gap: 16px; }
        .answer-item { background: #f8f9fa; border-radius: 8px; padding: 15px; border-left: 4px solid #11998e; }
        .answer-item h4 { color: #11998e; margin-bottom: 10px; font-size: 1em; }
        .ans-text { background: #e8f5e9; padding: 12px 15px; border-radius: 6px; font-family: Consolas, Monaco, monospace; font-size: 0.95em; color: #d32f2f; line-height: 1.6; }
        .zoom-img { max-width: 100%; border-radius: 6px; cursor: pointer; transition: transform 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .zoom-img:hover { transform: scale(1.02); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 9999; justify-content: center; align-items: center; }
        #overlay.show { display: flex; }
        #overlay .img-wrapper { position: relative; max-width: 98vw; max-height: 98vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #overlay img { max-width: 98vw; max-height: 85vh; object-fit: contain; border-radius: 4px; cursor: default; transition: transform 0.2s; }
        #overlay .zoom-bar { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 10001; display: flex; align-items: center; gap: 15px; }
        #overlay .zoom-btn { background: rgba(255,255,255,0.2); color: white; border: none; font-size: 24px; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; transition: background 0.2s; }
        #overlay .zoom-btn:hover { background: rgba(255,255,255,0.4); }
        #overlay .zoom-level { color: white; font-size: 16px; min-width: 60px; text-align: center; }
        #overlay .nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10001; display: flex; align-items: center; justify-content: center; gap: 30px; }
        #overlay .nav-btn { background: rgba(255,255,255,0.15); color: white; border: none; font-size: 18px; padding: 8px 24px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        #overlay .nav-btn:hover { background: rgba(255,255,255,0.3); }
        #overlay .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        #overlay .page-indicator { color: rgba(255,255,255,0.7); font-size: 15px; }
        #overlay .close-btn { position: fixed; top: 20px; right: 30px; color: white; font-size: 36px; cursor: pointer; opacity: 0.7; z-index: 10000; line-height: 1; }
        #overlay .close-btn:hover { opacity: 1; }
        .missing { color: #e57373; font-style: italic; }
        .placeholder { color: #999; font-style: italic; text-align: center; padding: 60px 20px; }
        footer { text-align: center; padding: 30px; color: #666; font-size: 0.9em; }
        .homework-header {
            position: relative;
        }
        #bg-music-btn {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50px;
            padding: 6px 14px 6px 12px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }
        #bg-music-btn:hover { background: rgba(255,255,255,0.35); }
    </style>
</head>
<body>
<audio id="bg-music-file" src="落了白.mp3" loop preload="auto"></audio><script>
var musicPlaying = false;
function toggleMusic() {
    var m = document.getElementById("bg-music-file");
    var btn = document.getElementById("bg-music-btn");
    if (!m) return;
    if (musicPlaying) {
        m.pause(); m.currentTime = 0;
        btn.innerHTML = "&#9835; 播放音乐";
    } else {
        m.play().catch(()=>{});
        btn.innerHTML = "&#9834; 暂停";
    }
    musicPlaying = !musicPlaying;
}
</script>
    <header>
        <img src="透明奋斗图.png" class="header-bg-img" alt="">
        <div class="header-content">
            <div class="motto">全力以赴 &nbsp; &nbsp;青春无悔</div>
            <div class="header-bottom-border"></div>
        </div>
    </header>
    <div id="overlay" onclick="if(event.target===this)closeZoom()">
        <span class="close-btn" onclick="closeZoom()">&times;</span>
        <div class="img-wrapper">
            <div class="zoom-bar">
                <button class="zoom-btn" onclick="zoomOut()">−</button>
                <span class="zoom-level" id="zoomLevel">100%</span>
                <button class="zoom-btn" onclick="zoomIn()">+</button>
            </div>
            <img id="zoomed-img" src="" alt="">
            <div class="nav-bar">
                <button class="nav-btn" id="prevBtn" onclick="prevImg()">&#9664; 上一页</button>
                <span class="page-indicator" id="pageIndicator">1 / 1</span>
                <button class="nav-btn" id="nextBtn" onclick="nextImg()">下一页 &#9654;</button>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="two-columns">
            <div class="card">
                <div class="card-header homework-header">
                    <span>&#128221;</span><span>作业布置</span>
                    <button id="bg-music-btn" onclick="toggleMusic()">&#9835; 播放音乐</button>
                </div>
                <div class="card-body">
                        <h3>今日作业</h3>
                        <div class="hw-text">（1）周五:《红对勾》69-70→ 周一早上收<br>（2）周末:《选修1》试卷→ 周一晚上检查</div>
                        <h3>近期学习任务</h3>
                        <div class="hw-text">（1）7.1前完成第四章新课学习<br>（2）新课作业及时完成<br>（3）复习试卷认真做<br>（4）7.8和7.9→期末考试(选修1+2+3)</div>

                </div>
            </div>
            <div class="card">
                <div class="card-header answer-header">
                    <span>&#9989;</span><span>答案核对</span>
                </div>
                <div class="card-body">
                    <div class="answer-content">
                        <div class="answer-item">
                            <img src="答案1.png" class="zoom-img" onclick="openGallery(0)">
                        </div>
                        <div class="answer-item">
                            <img src="答案2.png" class="zoom-img" onclick="openGallery(1)">
                        </div>
                        <div class="answer-item">
                            <img src="答案3.png" class="zoom-img" onclick="openGallery(2)">
                        </div>
                        <div class="answer-item">
                            <img src="答案4.png" class="zoom-img" onclick="openGallery(3)">
                        </div>
                        <div class="answer-item">
                            <img src="答案5.png" class="zoom-img" onclick="openGallery(4)">
                        </div>
                        <div class="answer-item">
                            <img src="答案6.png" class="zoom-img" onclick="openGallery(5)">
                        </div>
                        <div class="answer-item">
                            <img src="答案7.png" class="zoom-img" onclick="openGallery(6)">
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer>
        <p>桐城中学 · 物理教学组</p>
        <p>&copy; 2026 叶老师</p>
    </footer>
    <script>
    const answerImages = ['答案1.png', '答案2.png', '答案3.png', '答案4.png', '答案5.png', '答案6.png', '答案7.png'];
    let currentIndex = 0;
    let currentZoom = 1.0;

    function openGallery(index) {
        currentIndex = index;
        currentZoom = 1.0;
        showImage(index);
        document.getElementById('overlay').classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function showImage(index) {
        const img = document.getElementById('zoomed-img');
        img.src = answerImages[index];
        img.style.transform = 'scale(' + currentZoom + ')';
        document.getElementById('zoomLevel').textContent = Math.round(currentZoom * 100) + '%';
        const total = answerImages.length;
        document.getElementById('pageIndicator').textContent = (index + 1) + ' / ' + total;
        document.getElementById('prevBtn').disabled = (index === 0);
        document.getElementById('nextBtn').disabled = (index === total - 1);
    }

    function zoomIn() {
        if (currentZoom < 3) {
            currentZoom += 0.25;
            document.getElementById('zoomed-img').style.transform = 'scale(' + currentZoom + ')';
            document.getElementById('zoomLevel').textContent = Math.round(currentZoom * 100) + '%';
        }
    }

    function zoomOut() {
        if (currentZoom > 0.5) {
            currentZoom -= 0.25;
            document.getElementById('zoomed-img').style.transform = 'scale(' + currentZoom + ')';
            document.getElementById('zoomLevel').textContent = Math.round(currentZoom * 100) + '%';
        }
    }

    function nextImg() {
        if (currentIndex < answerImages.length - 1) {
            currentIndex++;
            currentZoom = 1.0;
            showImage(currentIndex);
        }
    }

    function prevImg() {
        if (currentIndex > 0) {
            currentIndex--;
            currentZoom = 1.0;
            showImage(currentIndex);
        }
    }

    function closeZoom() {
        document.getElementById('overlay').classList.remove('show');
        document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
        const overlay = document.getElementById('overlay');
        if (!overlay.classList.contains('show')) return;
        if (e.key === 'Escape') closeZoom();
        if (e.key === 'ArrowRight') nextImg();
        if (e.key === 'ArrowLeft') prevImg();
        if (e.key === '+' || e.key === '=') zoomIn();
        if (e.key === '-') zoomOut();
    });
    </script>
</body>
</html>
